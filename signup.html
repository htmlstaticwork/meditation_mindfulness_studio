<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Serenity Studio</title>
  <meta name="description" content="Start your mindfulness journey. Create your Serenity Studio account.">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231F4D3B' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z'/><path d='M2 22 12 12'/></svg>">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-layout" style="margin: 0;">

  <div class="auth-toggles">
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
      <i data-lucide="moon"></i>
    </button>
    <button class="rtl-toggle theme-toggle" aria-label="Toggle RTL/LTR">
      <i data-lucide="arrow-right-left"></i>
    </button>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
        <i data-lucide="leaf"></i>
        <span>Studio</span>
      </a>
      <h2>Begin Your Journey</h2>
      <p style="margin-bottom: 0;">Start your 14-day free trial today.</p>
    </div>

    <form action="dashboard.html" method="GET">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Jane Doe" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input type="email" id="email" class="form-input" placeholder="Email" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="form-password-wrapper">
          <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" required>
          <button type="button" class="password-toggle" aria-label="Toggle Password Visibility">
            <i data-lucide="eye"></i>
          </button>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <div class="form-password-wrapper">
          <input type="password" id="confirm-password" class="form-input" placeholder="Min. 8 characters" required>
          <button type="button" class="password-toggle" aria-label="Toggle Password Visibility">
            <i data-lucide="eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Create Account</button>
    </form>

    <div class="auth-divider">Or sign up with</div>

    <div class="flex flex-col gap-sm">
      <button type="button" class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button type="button" class="social-btn apple">
        <svg width="20" height="20" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
          <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
        </svg>
        Apple
      </button>
    </div>

    <div style="margin-top: 2rem; text-align: center;">
      <p style="font-size: 0.875rem; color: var(--color-text-muted);">
        Already have an account? <a href="login.html" style="color: var(--color-primary); font-weight: 500;">Sign in</a>
      </p>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
