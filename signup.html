<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Serenity Studio</title>
  <meta name="description" content="Start your mindfulness journey. Create your Serenity Studio account.">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231F4D3B' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z'/><path d='M2 22 12 12'/></svg>">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-layout" style="margin: 0;">

  <div class="auth-card">
    <div class="auth-header">
      <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
        <i data-lucide="leaf"></i>
        <span>Studio</span>
      </a>
      <h2>Begin Your Journey</h2>
      <p style="margin-bottom: 0;">Start your 14-day free trial today.</p>
    </div>

    <form action="dashboard.html" method="GET">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Jane Doe" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" class="form-input" placeholder="Min. 8 characters" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Create Account</button>
    </form>

    <div class="auth-divider">Or sign up with</div>

    <div class="flex flex-col gap-sm">
      <button type="button" class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button type="button" class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M16.1 7.42c-.05-.07-.12-.11-.2-.11h-1.63c-.09 0-.17.06-.19.14l-1.87 5.76h-.06l-1.89-5.76C10.23 7.37 10.15 7.31 10.06 7.31H8.43c-.08 0-.15.04-.2.11s-.06.15-.02.2l3 7.82V20c0 .11.09.2.2.2h1.36c.11 0 .2-.09.2-.2v-4.57l2.97-7.82c.03-.04.02-.12-.02-.2z"/>
          <path fill-rule="evenodd" clip-rule="evenodd" d="M12 22C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm0-18c-4.41 0-8 3.59-8 8s3.59 8 8 8 8-3.59 8-8-3.59-8-8-8z"/>
          <path d="M12 1.3C6.09 1.3 1.3 6.09 1.3 12S6.09 22.7 12 22.7 22.7 17.91 22.7 12 17.91 1.3 12 1.3zM12 21c-4.96 0-9-4.04-9-9s4.04-9 9-9 9 4.04 9 9-4.04 9-9 9z"/>
        </svg>
        Apple
      </button>
    </div>

    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--color-text-muted);">
      Already have an account? <a href="login.html" style="color: var(--color-primary); font-weight: 500;">Sign in</a>
    </p>

    <div style="text-align: center; margin-top: 1.5rem; display: flex; justify-content: center; gap: 0.5rem;">
      <button class="rtl-toggle" style="background: var(--color-surface-alt); border: none; padding: 0.5rem; border-radius: 4px; color: var(--color-text); cursor: pointer;" title="Toggle RTL">
        <i data-lucide="languages" style="width: 20px;"></i>
      </button>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode" style="margin: 0; background: var(--color-surface-alt);">
        <i data-lucide="moon"></i>
      </button>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
